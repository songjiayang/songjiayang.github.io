---
layout: default
---
<ul class='posts tag'>
{% for post in page.posts %}
  <li><a href="{{ post.url }}">{{ post.title }}</a> ({{ post.date | date_to_string }} | Tags: {{ post | tags }})</li>
{% endfor %}
</ul>

<div id="tag-cloud">
  <p>Tag <i class="fa fa-soundcloud"></i></p>
  {{ site | tag_cloud }}
</div>
