<header class="site-header">

  <div class="wrap">

    <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a>
    <p class='site-sub-title'>{{ site.sub_title }} </p>
    <nav class="site-nav">
      <a href="#" class="menu-icon"><i class="fa fa-bars"></i></a>
      <div class="trigger">
        {% for category in site.categories %}
          <a class="page-link"  href="/{{ category | first }}">{{ category | first }} </a>
        {% endfor %}

        <a class="page-link" href="/book">books online</a>
        <a class="page-link" href="/about">about</a>
      </div>
    </nav>

  </div>

</header>
