---
layout: default
---

<section>
  <ul class='posts tag'>
    {% for post in page.posts %}
      <li><a href="{{ post.url }}">{{ post.title }}</a> ({{ post.date | date: "%b %-d, %Y"  }})</li>
    {% endfor %}
  </ul>
</section>
<br/>
<section id="tag-cloud">
  <p class="title">标签云<p>
  {{ site | tag_cloud }}
</section>
